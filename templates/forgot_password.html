<!DOCTYPE html>
<html>
<head>
  <title>Forgot Password</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background: #f0f2f5; }
  </style>
</head>
<body>
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow p-4">
        <h4 class="text-center mb-1" style="color:#1a237e;">🔑 Forgot Password</h4>
        <p class="text-center text-muted mb-4">Enter your BMSIT email to receive OTP</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for cat, msg in messages %}
            <div class="alert alert-{{cat}}">{{msg}}</div>
          {% endfor %}
        {% endwith %}

        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-bold">Email Address</label>
            <input type="email" name="email" class="form-control"
                   placeholder="yourname@bmsit.in" required>
          </div>
          <button class="btn w-100 py-2 text-white" style="background:#1a237e;">
            Send OTP
          </button>
        </form>
        <div class="text-center mt-3">
          <a href="/login" class="text-muted small">← Back to Login</a>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
