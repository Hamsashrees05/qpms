<!DOCTYPE html>
<html>
<head>
  <title>Create Question Paper</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    .header-box { background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
    .footer-box { background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 8px; padding: 10px; text-align: center; margin-top: 20px; }
    .questions-area { border: 2px dashed #1a237e; border-radius: 8px; padding: 20px; }
  </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-4">
  <span class="navbar-brand">QPMS - Create Question Paper</span>
  <a href="/teacher" class="btn btn-outline-light btn-sm">Back</a>
</nav>
<div class="container mt-4">
  <form method="POST">

    <!-- FIXED HEADER (set by admin) -->
    <div class="header-box text-center">
      <div class="row align-items-center">
        <div class="col-2">
          <img src="/static/images/vtu_logo.png" height="60" onerror="this.style.display='none'">
        </div>
        <div class="col-8">
          <h5 class="mb-0">BMS INSTITUTE OF TECHNOLOGY & MANAGEMENT</h5>
          <small class="text-muted">Affiliated to Visvesvaraya Technological University, Belagavi</small>
        </div>
        <div class="col-2">
          <img src="/static/images/bmsit_logo.png" height="60" onerror="this.style.display='none'">
        </div>
      </div>
      <hr>
      <!-- Paper Details -->
      <div class="row mt-2">
        <div class="col-md-4">
          <label class="form-label">Subject</label>
          <input type="text" name="subject" class="form-control" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">Semester</label>
          <select name="semester" class="form-select">
            <option>1st Sem</option><option>2nd Sem</option>
            <option>3rd Sem</option><option>4th Sem</option>
            <option>5th Sem</option><option>6th Sem</option>
            <option>7th Sem</option><option>8th Sem</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Exam Type</label>
          <select name="exam_type" class="form-select">
            <option>CIE 1</option>
            <option>CIE 2</option>
            <option>SEE</option>
          </select>
        </div>
      </div>
    </div>

    <!-- QUESTIONS AREA (teacher fills this) -->
    <div class="questions-area">
      <p class="text-muted mb-2">✏️ Enter your questions below:</p>
      <textarea name="questions" class="form-control border-0"
                rows="20" placeholder="Q1. ...&#10;Q2. ...&#10;Q3. ..."
                style="resize:none; background:transparent;"></textarea>
    </div>

    <!-- FIXED FOOTER (set by admin) -->
    <div class="footer-box">
      <small>{{template.footer_text if template else 'BMS Institute of Technology & Management, Bengaluru - 560064'}}</small>
    </div>

    <!-- ACTION BUTTONS -->
    <div class="mt-3 d-flex gap-2">
      <button type="submit" name="action" value="save" class="btn btn-secondary">Save as Draft</button>
      <button type="submit" name="action" value="submit" class="btn btn-primary">Submit to HOD</button>
    </div>

  </form>
</div>
</body>
</html>
