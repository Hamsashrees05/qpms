<!DOCTYPE html>
<html>
<head>
  <title>QPMS - Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background: #f0f2f5; }
    .card { border-radius: 15px; }
    .btn-primary { background: #1a237e; border: none; }
    .logo-text { color: #1a237e; font-weight: 800; }
  </style>
</head>
<body>
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow p-4">
        <h3 class="text-center logo-text mb-1">BMSIT</h3>
        <p class="text-center text-muted mb-4">Question Paper Management System</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for cat, msg in messages %}
            <div class="alert alert-{{cat}}">{{msg}}</div>
          {% endfor %}
        {% endwith %}

        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Email address</label>
            <input type="email" name="email" class="form-control"
                   placeholder="yourname@bmsit.in" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <button class="btn btn-primary w-100 py-2">Login</button>
        </form>
      </div>
    </div>
  </div>
</div>
</body>
</html>
