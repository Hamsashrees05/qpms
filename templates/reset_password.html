<!DOCTYPE html>
<html>
<head>
  <title>Reset Password</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background: #f0f2f5; }
  </style>
</head>
<body>
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow p-4">
        <h4 class="text-center mb-1" style="color:#1a237e;">🔒 Reset Password</h4>
        <p class="text-center text-muted mb-4">Enter OTP and your new password</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for cat, msg in messages %}
            <div class="alert alert-{{cat}}">{{msg}}</div>
          {% endfor %}
        {% endwith %}

        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-bold">Enter OTP</label>
            <input type="text" name="otp" class="form-control text-center"
                   maxlength="6" placeholder="------" required
                   style="letter-spacing: 10px; font-size: 20px;">
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">New Password</label>
            <input type="password" name="new_password" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Confirm Password</label>
            <input type="password" name="confirm_password" class="form-control" required>
          </div>
          <button class="btn w-100 py-2 text-white" style="background:#1a237e;">
            Reset Password
          </button>
        </form>
        <div class="text-center mt-3">
          <a href="/login" class="text-muted small">← Back to Login</a>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
